<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="780" viewBox="0 0 1000 780" font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="780" fill="#fafafa"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a1a">Robot Wiring &amp; Drivetrain Schematic (Basic)</text>
  <text x="500" y="64" text-anchor="middle" font-size="14" fill="#666">Simplified block diagram inferred from build photos</text>

  <!-- ===================== POWER SOURCE ===================== -->
  <rect x="400" y="90" width="200" height="60" rx="8" fill="#2c3e50" stroke="#000" stroke-width="2"/>
  <text x="500" y="115" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">Battery Pack</text>
  <text x="500" y="135" text-anchor="middle" font-size="12" fill="#cfd8dc">Power Source</text>

  <!-- Power wire down to Hub -->
  <line x1="500" y1="150" x2="500" y2="190" stroke="#e67e22" stroke-width="4"/>
  <text x="515" y="175" font-size="11" fill="#e67e22">power</text>

  <!-- ===================== MAIN CONTROLLER / HUB ===================== -->
  <rect x="350" y="190" width="300" height="100" rx="8" fill="#212121" stroke="#000" stroke-width="2"/>
  <text x="500" y="220" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Main Controller / Hub</text>
  <text x="500" y="240" text-anchor="middle" font-size="12" fill="#bdbdbd">(black housing w/ button, top of chassis)</text>
  <circle cx="610" cy="205" r="6" fill="#888" stroke="#fff" stroke-width="1"/>
  <text x="500" y="262" text-anchor="middle" font-size="11" fill="#9e9e9e">Motor Port A         Motor Port B</text>

  <!-- Port A wire down to Steering Motor -->
  <line x1="430" y1="290" x2="430" y2="350" stroke="#1976d2" stroke-width="4"/>
  <text x="345" y="320" font-size="11" fill="#1976d2">signal/power</text>

  <!-- Port B wire down to Drive Motor -->
  <line x1="570" y1="290" x2="570" y2="350" stroke="#1976d2" stroke-width="4"/>
  <text x="585" y="320" font-size="11" fill="#1976d2">signal/power</text>

  <!-- ===================== STEERING MOTOR ===================== -->
  <rect x="320" y="350" width="220" height="70" rx="8" fill="#00838f" stroke="#000" stroke-width="2"/>
  <text x="430" y="378" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">Steering Motor</text>
  <text x="430" y="396" text-anchor="middle" font-size="11" fill="#e0f7fa">(teal motor, top linkage)</text>

  <!-- ===================== DRIVE MOTOR ===================== -->
  <rect x="460" y="350" width="220" height="70" rx="8" fill="#00838f" stroke="#000" stroke-width="2"/>
  <text x="570" y="378" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">Drive Motor</text>
  <text x="570" y="396" text-anchor="middle" font-size="11" fill="#e0f7fa">(teal motor, mid chassis)</text>

  <!-- Mechanical link: steering motor -> steering linkage -> front wheels -->
  <line x1="430" y1="420" x2="430" y2="470" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>
  <line x1="200" y1="470" x2="660" y2="470" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- Front Left Wheel -->
  <rect x="120" y="490" width="160" height="55" rx="8" fill="#424242" stroke="#000" stroke-width="2"/>
  <text x="200" y="513" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Front-Left Wheel</text>
  <text x="200" y="530" text-anchor="middle" font-size="10" fill="#cfd8dc">(steered)</text>

  <!-- Front Right Wheel -->
  <rect x="580" y="490" width="160" height="55" rx="8" fill="#424242" stroke="#000" stroke-width="2"/>
  <text x="660" y="513" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Front-Right Wheel</text>
  <text x="660" y="530" text-anchor="middle" font-size="10" fill="#cfd8dc">(steered)</text>

  <line x1="200" y1="470" x2="200" y2="490" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>
  <line x1="660" y1="470" x2="660" y2="490" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- Mechanical link: drive motor -> yellow gear / differential -> rear wheels -->
  <line x1="570" y1="420" x2="570" y2="600" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- Differential / Gearbox -->
  <rect x="460" y="600" width="220" height="60" rx="8" fill="#fbc02d" stroke="#000" stroke-width="2"/>
  <text x="570" y="625" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="bold">Differential Gearbox</text>
  <text x="570" y="644" text-anchor="middle" font-size="11" fill="#5d4037">(yellow gears, rear axle)</text>

  <line x1="460" y1="630" x2="280" y2="630" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>
  <line x1="680" y1="630" x2="860" y2="630" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>
  <line x1="280" y1="630" x2="280" y2="660" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>
  <line x1="860" y1="630" x2="860" y2="660" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>

  <!-- Rear Left Wheel -->
  <rect x="200" y="660" width="160" height="55" rx="8" fill="#424242" stroke="#000" stroke-width="2"/>
  <text x="280" y="683" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Rear-Left Wheel</text>
  <text x="280" y="700" text-anchor="middle" font-size="10" fill="#cfd8dc">(driven)</text>

  <!-- Rear Right Wheel -->
  <rect x="780" y="660" width="160" height="55" rx="8" fill="#424242" stroke="#000" stroke-width="2"/>
  <text x="860" y="683" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Rear-Right Wheel</text>
  <text x="860" y="700" text-anchor="middle" font-size="10" fill="#cfd8dc">(driven)</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="40" y="90" width="230" height="120" rx="6" fill="#ffffff" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="55" y="112" font-size="13" font-weight="bold" fill="#1a1a1a">Legend</text>

  <line x1="55" y1="130" x2="90" y2="130" stroke="#e67e22" stroke-width="4"/>
  <text x="98" y="134" font-size="12" fill="#333">Power wire</text>

  <line x1="55" y1="152" x2="90" y2="152" stroke="#1976d2" stroke-width="4"/>
  <text x="98" y="156" font-size="12" fill="#333">Signal/power wire</text>

  <line x1="55" y1="174" x2="90" y2="174" stroke="#757575" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="98" y="178" font-size="12" fill="#333">Mechanical link</text>

  <rect x="55" y="190" width="14" height="14" fill="#00838f"/>
  <text x="98" y="201" font-size="12" fill="#333">Motor</text>

  <!-- Note -->
  <text x="500" y="755" text-anchor="middle" font-size="11" fill="#888">Note: simplified topology based on visual inspection of the build — exact connector/pin labels not verified.</text>

</svg>
